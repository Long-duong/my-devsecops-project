apiVersion: apps/v1
kind: Deployment
metadata:
  name: youtube-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: youtube-app
  template:
    metadata:
      labels:
        app: youtube-app
    spec:
      containers:
      - name: youtube-app
        image: long12si/my-youtube-app:latest
        imagePullPolicy: IfNotPresent # Vì bạn đã import vào k3d rồi
        ports:
        - containerPort: 3000
